<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Блог</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .post {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .post a {
            text-decoration: none;
            color: #333;
        }

        .post a:hover {
            color: #4a90e2;
        }
    </style>
</head>
<body>

<header>
    <h1>Мой блог</h1>
</header>

<div class="container">

    {% for post in posts %}
        <div class="post">
            <h2>
                <a href="{% url 'post_detail' post.pk %}">
                    {{ post.title }}
                </a>
            </h2>
        </div>
    {% empty %}
        <p>Постов пока нет</p>
    {% endfor %}

</div>

</body>
</html>
