<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .comment {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #357abd;
        }

        h2 {
            margin-top: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>{{ post.title }}</h1>
</header>

<div class="container">

    <div class="card">
        <p>{{ post.content }}</p>
    </div>

    <div class="card">
        <h2>Комментарии</h2>

        {% for comment in comments %}
            <div class="comment">
                <b>{{ comment.author }}</b><br>
                {{ comment.text }}
            </div>
        {% empty %}
            <p>Комментариев нет</p>
        {% endfor %}
    </div>

    <div class="card">
        <h2>Добавить комментарий</h2>

        <form method="post">
            {% csrf_token %}
            {{ comment_form.as_p }}
            <button type="submit" name="comment_submit">Отправить</button>
        </form>
    </div>

    <div class="card">
        <h2>Подписка на новости</h2>

        <form method="post">
            {% csrf_token %}
            {{ subscription_form.as_p }}
            <button type="submit" name="subscribe_submit">
                Подписаться
            </button>
        </form>
    </div>

</div>

</body>
</html>
